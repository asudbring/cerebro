name = "cerebro-mcp-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
SUPABASE_FUNCTION_URL = "https://YOUR_PROJECT_REF.supabase.co/functions/v1/cerebro-mcp-readonly"
ENTRA_TENANT_ID = "YOUR_ENTRA_TENANT_ID"
ENTRA_CLIENT_ID = "YOUR_ENTRA_CLIENT_ID"

[[routes]]
pattern = "mcp.yourdomain.com/*"
zone_name = "yourdomain.com"
